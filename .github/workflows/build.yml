name: Build binaries

# Build the GUI app and CLI binary for macOS (Apple Silicon + Intel) and
# Windows. Run manually from the Actions tab, or push a version tag (v*) to
# also attach the binaries to a GitHub Release.
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write          # needed to upload assets to a Release

jobs:
  macos:
    name: macOS (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14   # Apple Silicon
            arch: arm64
          - runner: macos-13   # Intel
            arch: x86_64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip pyinstaller
      - name: Build GUI app + CLI binary
        run: ./build_macos.sh
      - name: Package
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent "Batch LEAPP.app" "../Batch-LEAPP-macos-${{ matrix.arch }}.zip"
          tar -czf "../batch-leapp-macos-${{ matrix.arch }}.tar.gz" batch-leapp
      - uses: actions/upload-artifact@v5
        with:
          name: macos-${{ matrix.arch }}
          path: |
            Batch-LEAPP-macos-${{ matrix.arch }}.zip
            batch-leapp-macos-${{ matrix.arch }}.tar.gz
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Batch-LEAPP-macos-${{ matrix.arch }}.zip
            batch-leapp-macos-${{ matrix.arch }}.tar.gz

  windows:
    name: Windows (x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip pyinstaller
      - name: Build GUI exe + CLI exe
        run: |
          python -m PyInstaller --noconfirm --onefile --windowed --clean --name "Batch LEAPP" --icon leapps.ico batch_leapp_gui.py
          python -m PyInstaller --noconfirm --onefile --clean --name batch-leapp --icon leapps.ico batch_leapp.py
      - name: Package
        shell: pwsh
        run: Compress-Archive -Path "dist/Batch LEAPP.exe","dist/batch-leapp.exe" -DestinationPath "Batch-LEAPP-windows-x64.zip"
      - uses: actions/upload-artifact@v5
        with:
          name: windows-x64
          path: Batch-LEAPP-windows-x64.zip
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Batch-LEAPP-windows-x64.zip
